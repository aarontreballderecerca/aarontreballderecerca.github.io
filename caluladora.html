<!DOCTYPE html>
<html>
<head>
	<title>Consumo Eléctrico</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background-color: #F5F5F5;
		}

		header {
			background-color: #1caee7;
			color: #FFF;
			padding: 10px;
			text-align: center;
		}

		main {
			max-width: 800px;
			margin: 0 auto;
			padding: 20px;
			background-color: #FFF;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
			border-radius: 5px;
			text-align: justify;
			line-height: 1.5;
		}

		nav {
			background-color: #EEE;
			padding: 10px;
			text-align: center;
		}

		nav ul {
			list-style: none;
			margin: 0;
			padding: 0;
		}

		nav li {
			display: inline-block;
			margin: 0 10px;
		}

		nav a {
			color: #333;
			text-decoration: none;
			font-weight: bold;
		}

		nav a:hover {
			color: #15cc77;
		}

		footer {
			background-color: #222;
			color: #FFF;
			padding: 10px;
			text-align: center;
		}

		.menu-btn {
			display: none;
		}

		@media screen and (max-width: 768px) {
			nav ul {
				display: none;
			}

			.menu-btn {
				display: block;
				background-color: #222;
				color: #FFF;
				border: none;
				border-radius: 3px;
				padding: 10px 15px;
				font-size: 14px;
				cursor: pointer;
				margin-top: 10px;
			}

			nav.active ul {
				display: block;
			}
		}
	</style>
</head>
<body>
	<header>
		<h1>El Consumo Eléctrico</h1>
	</header>

	<nav>
		<ul>
			<li><a href="index.html">Inicio</a></li>
			<li><a href="consejosdeahorro.html">Consejos de ahorro</a></li>
		</ul>
	</nav>
    






        <main>
            <h2>Calculadora de consumo eléctrico</h2>
            <form onsubmit="calcular(); return false;">
              <label for="electrodomestico">Electrodoméstico:</label>
              <select id="electrodomestico">
                <option value="nevera">Nevera</option>
                <option value="lavadora">Lavadora</option>
                <option value="televisor">Televisor</option>
              </select>
              <br>
              <label for="potencia">Potencia (watts):</label>
              <input type="number" id="potencia" required>
              <br>
              <label for="tiempo">Tiempo de uso diario (horas):</label>
              <input type="number" id="tiempo" required>
              <br>
              <label for="precio">Precio de la electricidad (€/kWh):</label>
              <input type="number" id="precio" step="0.01" required>
              <br>
              <button type="submit">Calcular</button>
            </form>
            <div id="resultados"></div>
          
          
          <script>
            function calcular() {
              var electrodomestico = document.getElementById("electrodomestico").value;
              var potencia = document.getElementById("potencia").value;
              var tiempo = document.getElementById("tiempo").value;
              var precio = document.getElementById("precio").value;
              var consumo = potencia * tiempo * 30 / 1000;
              var costo = consumo * precio;
              document.getElementById("resultados").innerHTML = "El consumo eléctrico del/la " + electrodomestico + " es de " + consumo.toFixed(2) + " kWh al mes, lo que equivale a €" + costo.toFixed(2) + ".";
            }
          </script>
